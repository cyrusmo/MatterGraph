[project]
name = "mattergraph-core"
version = "0.1.0"
description = "Core schema, normalization, and crystal graphs for MatterGraph."
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
dependencies = [
  "pydantic>=2.5",
  "numpy>=1.24",
  "pandas>=2.0",
  "pymatgen>=2024.1.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["mattergraph"]

[tool.hatch.build.targets.sdist]
include = ["mattergraph/**"]

[tool.ruff]
line-length = 100
target-version = "py310"
