[project]
name = "mattergraph-connectors"
version = "0.1.0"
description = "Connectors to public materials databases for MatterGraph."
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
dependencies = [
  "mattergraph-core",
  "httpx>=0.27.0",
  "pandas>=2.0",
  "pymatgen>=2024.1.1",
  "pydantic>=2.5",
  "tqdm>=4.66",
  "mp-api>=0.40.0",
  "jarvis-tools>=2024.1.1",
  "aioitertools",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
mattergraph-core = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["mattergraph_connectors"]
