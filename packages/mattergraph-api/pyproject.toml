[project]
name = "mattergraph-api"
version = "0.1.0"
description = "FastAPI service for the MatterGraph demo and integrations."
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
dependencies = [
  "mattergraph-core",
  "mattergraph-connectors",
  "mattergraph-sim",
  "fastapi>=0.110",
  "uvicorn[standard]>=0.29.0",
  "pydantic>=2.5",
  "pydantic-settings>=2.2",
  "pymatgen>=2024.1.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
mattergraph-core = { workspace = true }
mattergraph-connectors = { workspace = true }
mattergraph-sim = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["app"]
